<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDO Smart Tax Hub — Login</title>
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f0f2f5;
            font-family: 'Segoe UI', sans-serif;
        }
        .card {
            background: #fff;
            border-radius: 14px;
            padding: 40px 36px;
            width: 380px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.10);
        }
        .card .logo { text-align: center; margin-bottom: 28px; }
        .card .logo img { width: 120px; }
        .card h2 { font-size: 20px; text-align: center; color: #1a1a2e; margin-bottom: 4px; }
        .card p.subtitle { text-align: center; font-size: 13px; color: #888; margin-bottom: 28px; }

        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 12px; color: #666; margin-bottom: 5px; font-weight: 500; }
        .input-wrap { position: relative; }
        .input-wrap ion-icon {
            position: absolute;
            left: 11px; top: 50%;
            transform: translateY(-50%);
            color: #aaa; font-size: 18px;
        }
        .form-group input {
            width: 100%;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px 10px 10px 36px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus { border-color: #d40000; }

        .error-msg {
            background: #fff0f0;
            border: 1px solid #ffd6d6;
            color: #c00;
            border-radius: 6px;
            padding: 9px 12px;
            font-size: 13px;
            margin-bottom: 14px;
        }
        .btn-login {
            width: 100%;
            background: #d40000;
            color: #fff;
            border: none;
            padding: 11px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 4px;
            transition: background 0.2s;
        }
        .btn-login:hover { background: #b30000; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <img src="{% static 'img/BDO_logo_Rojo.png' %}" alt="BDO Logo"
                 onerror="this.style.display='none'">
            <h2 style="margin-top:8px;">BDO Smart Tax Hub</h2>
        </div>
        <p class="subtitle">Sign in to your account</p>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Username</label>
                <div class="input-wrap">
                    <ion-icon name="person-outline"></ion-icon>
                    <input type="text" name="username" placeholder="Your username" required autofocus>
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrap">
                    <ion-icon name="lock-closed-outline"></ion-icon>
                    <input type="password" name="password" placeholder="Your password" required>
                </div>
            </div>
            <button type="submit" class="btn-login">Sign In</button>
        </form>
    </div>
</body>
</html>
